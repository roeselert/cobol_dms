# Full local/CI stack: the Java app plus its two Python document services.
# In production each container runs in its own Hugging Face Space; the shared
# service token then comes from Space Secrets instead of the dev default.
#
#   docker compose up --build          # app on http://localhost:7860 (dev auth)
#   DMS_AI_TOKEN=sk-... docker compose up --build   # with real AI extraction

services:
  conversion:
    build: services/conversion
    environment:
      - DMS_SERVICE_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 30

  extraction:
    build: services/extraction
    environment:
      - DMS_SERVICE_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
      # blank token -> the service answers status=unconfigured and the stack
      # still works; documents are flagged for manual indexing
      - DMS_AI_URL=${DMS_AI_URL:-https://api.openai.com/v1}
      - DMS_AI_TOKEN=${DMS_AI_TOKEN:-}
      - DMS_AI_MODEL=${DMS_AI_MODEL:-gpt-5-mini}
      - DMS_AI_DOCUMENT_MODE=${DMS_AI_DOCUMENT_MODE:-text}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 30

  dms:
    build: dms
    ports:
      - "7860:7860"
    environment:
      - DMS_SECURITY_MODE=dev
      - DMS_CONVERSION_URL=http://conversion:7860
      - DMS_EXTRACTION_URL=http://extraction:7860
      - DMS_SERVICES_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
    depends_on:
      conversion:
        condition: service_healthy
      extraction:
        condition: service_healthy

  # GNU COBOL migration stack (iteration 2 slice) on :7861 — build
  # context is the repo root because the image compiles src/ and ships
  # the shared static frontend
  dms-cobol:
    build:
      context: .
      dockerfile: cobol/Dockerfile
    ports:
      - "7861:7860"
    environment:
      - DMS_SECURITY_MODE=dev
      - DMS_BOOTSTRAP_ADMINS=admin@example.com
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
