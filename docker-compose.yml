# Local/CI stack: the GNU COBOL DMS behind Apache + CGI. The Java app and
# the two Python document services have been decommissioned — the COBOL
# stack is the whole system now (conversion runs in-process in the worker
# daemon, AI extraction via libcurl).
#
#   docker compose up --build        # app on http://localhost:7860 (dev auth)
#   DMS_AI_TOKEN=sk-... docker compose up --build   # with real AI extraction

services:
  # GNU COBOL DMS — build context is the repo root because the image
  # compiles src/ and ships the static frontend from web/.
  dms:
    build:
      context: .
      dockerfile: cobol/Dockerfile
    ports:
      - "7860:7860"
    environment:
      - DMS_SECURITY_MODE=dev
      - DMS_BOOTSTRAP_ADMINS=admin@example.com
      # blank token -> AI extraction stays gracefully unconfigured and
      # documents are flagged for manual indexing
      - DMS_AI_URL=${DMS_AI_URL:-https://api.openai.com/v1}
      - DMS_AI_TOKEN=${DMS_AI_TOKEN:-}
      - DMS_AI_MODEL=${DMS_AI_MODEL:-gpt-5-mini}
      # set to 1/true/yes/on to log each AI request AND response (human-readable)
      - DMS_AI_LOG_REQUEST=${DMS_AI_LOG_REQUEST:-}
    volumes:
      # VSAM indexed files + object store under /data
      - dms-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  dms-data:
