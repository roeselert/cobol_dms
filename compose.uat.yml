# UAT stack for the VPS, run with Podman: instead of building locally (see
# docker-compose.yml) this pulls the three images CI publishes to the GitHub
# Container Registry — :latest always tracks main, and pull_policy: always
# re-pulls on every up, so a restart is a deploy.
#
#   podman login ghcr.io                            # once, if the packages are private
#   podman compose -f compose.uat.yml up -d         # app on http://<vps>:7860
#   podman compose -f compose.uat.yml down          # dms-data volume survives
#
# UAT runs with dev header auth (DMS_SECURITY_MODE=dev): identity travels as
# the X-Dev-User header without any credential check — do not expose this
# stack to the public internet. AI extraction stays gracefully unconfigured
# unless DMS_AI_TOKEN is set.

services:
  conversion:
    image: ghcr.io/roeselert/clouddms/dms-conversion:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      - DMS_SERVICE_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 30

  extraction:
    image: ghcr.io/roeselert/clouddms/dms-extraction:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      - DMS_SERVICE_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
      # blank token -> the service answers status=unconfigured and the stack
      # still works; documents are flagged for manual indexing
      - DMS_AI_URL=${DMS_AI_URL:-https://api.openai.com/v1}
      - DMS_AI_TOKEN=${DMS_AI_TOKEN:-}
      - DMS_AI_MODEL=${DMS_AI_MODEL:-gpt-5-mini}
      - DMS_AI_DOCUMENT_MODE=${DMS_AI_DOCUMENT_MODE:-text}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7860/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 30

  dms:
    image: ghcr.io/roeselert/clouddms/dms:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      # dev by default (see header warning); export DMS_SECURITY_MODE=oidc plus
      # the issuer URI to run UAT against a real IdP
      - DMS_SECURITY_MODE=${DMS_SECURITY_MODE:-dev}
      - DMS_CONVERSION_URL=http://conversion:7860
      - DMS_EXTRACTION_URL=http://extraction:7860
      - DMS_SERVICES_TOKEN=${DMS_SERVICES_TOKEN:-dev-token}
    volumes:
      # SQLite DB + object store; the image's /data is owned by uid 1000, and
      # the volume inherits that ownership on first use
      - dms-data:/data
    depends_on:
      conversion:
        condition: service_healthy
      extraction:
        condition: service_healthy

  # The GNU COBOL migration stack (iteration 2: platform layer +
  # organization BC behind Apache/CGI). Runs alongside the Java stack
  # on its own port + volume so both can be compared during migration.
  # Image is published by .github/workflows/cobol-ci.yml on main.
  dms-cobol:
    image: ghcr.io/roeselert/clouddms/dms-cobol:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "7861:7860"
    environment:
      - DMS_SECURITY_MODE=${DMS_SECURITY_MODE:-dev}
      - DMS_BOOTSTRAP_ADMINS=${DMS_BOOTSTRAP_ADMINS:-admin@example.com}
    volumes:
      # VSAM indexed files under /data/vsam
      - dms-cobol-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  dms-data:
  dms-cobol-data:
