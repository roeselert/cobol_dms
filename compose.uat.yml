# UAT stack for the VPS, run with Podman: instead of building locally (see
# docker-compose.yml) this pulls the dms-cobol image CI publishes to the
# GitHub Container Registry — :latest always tracks main, and
# pull_policy: always re-pulls on every up, so a restart is a deploy.
#
#   podman login ghcr.io                          # once, if the package is private
#   podman compose -f compose.uat.yml up -d       # app on http://<vps>:7860
#   podman compose -f compose.uat.yml down        # dms-cobol-data volume survives
#
# The Java app and the Python conversion/extraction services have been
# decommissioned; the GNU COBOL DMS is the whole system (conversion in the
# in-process worker daemon, AI extraction via libcurl).
#
# UAT runs with dev header auth (DMS_SECURITY_MODE=dev): identity travels as
# the X-Dev-User header without any credential check — do not expose this
# stack to the public internet. AI extraction stays gracefully unconfigured
# unless DMS_AI_TOKEN is set.

services:
  # GNU COBOL DMS behind Apache/CGI. Image published by
  # .github/workflows/cobol-ci.yml on main.
  dms:
    image: ghcr.io/roeselert/clouddms/dms-cobol:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      # dev by default (see header warning); export DMS_SECURITY_MODE=oidc plus
      # the issuer URI to run UAT against a real IdP
      - DMS_SECURITY_MODE=${DMS_SECURITY_MODE:-dev}
      - DMS_BOOTSTRAP_ADMINS=${DMS_BOOTSTRAP_ADMINS:-admin@example.com}
      # blank token -> AI extraction stays gracefully unconfigured
      - DMS_AI_URL=${DMS_AI_URL:-https://api.openai.com/v1}
      - DMS_AI_TOKEN=${DMS_AI_TOKEN:-}
      - DMS_AI_MODEL=${DMS_AI_MODEL:-gpt-5-mini}
      # set to 1/true/yes/on to log each AI request AND response (human-readable)
      - DMS_AI_LOG_REQUEST=${DMS_AI_LOG_REQUEST:-}
    volumes:
      # VSAM indexed files + object store under /data
      - dms-cobol-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  dms-cobol-data:
