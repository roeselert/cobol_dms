server:
  port: ${SERVER_PORT:8080}
  # honor X-Forwarded-* from the TLS proxy (HF Space / VPS) so generated
  # absolute URLs (RSS links, issued feed URLs) carry the external scheme/host
  forward-headers-strategy: framework

spring:
  application:
    name: dms
  datasource:
    url: jdbc:sqlite:${dms.data-dir}/dms.db?journal_mode=WAL&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 4
      connection-init-sql: PRAGMA foreign_keys=ON
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB
  # In oidc mode set the IdP via environment:
  # SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://huggingface.co (HF OAuth)

dms:
  data-dir: ${DMS_DATA_DIR:./data}
  security:
    # oidc = validate bearer tokens against the IdP (production, the default —
    #        startup fails fast when no issuer URI is configured);
    # dev  = trust the X-Dev-User header (local development / demo only,
    #        must be enabled explicitly: DMS_SECURITY_MODE=dev)
    mode: ${DMS_SECURITY_MODE:oidc}
    bootstrap-admin-emails: ${DMS_BOOTSTRAP_ADMINS:admin@example.com}
  upload:
    max-bytes: 104857600
  worker:
    enabled: true
    poll-millis: 2000
    # jobs drained sequentially per poll round (not parallelism)
    batch-size: 2
    max-attempts: 5
    backoff-base-millis: 5000
    lease-seconds: 300
  bucket:
    # when endpoint is empty the objectstore BC falls back to the local filesystem
    endpoint: ${DMS_BUCKET_ENDPOINT:}
    name: ${DMS_BUCKET_NAME:}
    region: ${DMS_BUCKET_REGION:us-east-1}
    key-id: ${DMS_BUCKET_KEY_ID:}
    secret: ${DMS_BUCKET_SECRET:}
  services:
    # The Python document services (services/ in this repo). Conversion is
    # mandatory for ingest (the worker fails jobs while it is unreachable);
    # extraction is optional — while no URL is configured suggestions are
    # skipped gracefully and documents are flagged for manual indexing.
    # The AI provider connection (DMS_AI_URL/TOKEN/MODEL/DOCUMENT_MODE) is
    # configured on the extraction service itself, not here. What to extract
    # (document classes, intents and their fields, Ordnungsbegriff types) is
    # managed in the database via the Administration UI and travels with
    # every extraction request.
    token: ${DMS_SERVICES_TOKEN:}
    conversion:
      url: ${DMS_CONVERSION_URL:}
      connect-timeout-seconds: 10
      read-timeout-seconds: 300
    extraction:
      url: ${DMS_EXTRACTION_URL:}
      connect-timeout-seconds: 10
      read-timeout-seconds: 180
  feed:
    # oidc mode refuses to start with the default secret (fails closed)
    token-secret: ${DMS_FEED_TOKEN_SECRET:change-me-in-production}
    token-ttl-days: ${DMS_FEED_TOKEN_TTL_DAYS:90}
  backup:
    enabled: ${DMS_BACKUP_ENABLED:true}
    interval-minutes: 60
    # newest remote snapshots kept in the bucket (3 days of hourly backups)
    retention-count: ${DMS_BACKUP_RETENTION:72}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: db,objectStore,worker

resilience4j:
  retry:
    instances:
      ai:
        max-attempts: 3
        wait-duration: 1s
  circuitbreaker:
    instances:
      ai:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
