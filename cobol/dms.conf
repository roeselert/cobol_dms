# Apache vhost for the GNU COBOL DMS (TARGET-ARCHITECTURE.md §1):
# serves the static SPA and dispatches /api/v1/... to the CGI program.
# ScriptAlias /api -> dispatcher, so PATH_INFO carries "/v1/...".
<VirtualHost *:7860>
    ServerName dms-cobol
    DocumentRoot /app/static

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    # identity + config for the CGI processes; COB_FILE_PATH points the
    # GnuCOBOL runtime's indexed files at the data volume (start.sh),
    # DMS_DATA_DIR the object store (originals/renditions + upload staging)
    PassEnv DMS_SECURITY_MODE
    PassEnv DMS_BOOTSTRAP_ADMINS
    PassEnv COB_FILE_PATH
    PassEnv DMS_DATA_DIR
    PassEnv DMS_UPLOAD_MAX_BYTES
    PassEnv DMS_AI_TOKEN

    ScriptAlias /api /app/cgi-bin/dmsapi

    <Directory /app/static>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /app/cgi-bin>
        Options +ExecCGI
        Require all granted
    </Directory>
</VirtualHost>
